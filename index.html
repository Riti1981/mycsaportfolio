<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- FIRST SCREEN: WELCOME + CHOOSE SHIP -->
    <section id="ship-screen">

        <img src="images/Welcomeaboard.png" alt="Welcome Aboard" class="welcome-image">

        <h2>Choose Your Ship</h2>

        <div class="ship-options">
            <img src="images/ship#1.png" onclick="chooseShip('images/ship#1.png')" alt="Ship 1">
            <img src="images/ship2.jpg" onclick="chooseShip('images/ship2.jpg')" alt="Ship 2">
        </div>

    </section>

    <!-- SECOND SCREEN: MAP -->
    <section id="map-screen">

        <div class="map-container">

            <img src="images/map.jpg" class="map" alt="Grand Line Map">

            <img id="chosen-ship" class="ship" alt="Chosen Ship">

            <button class="island island1" onclick="travelTo('aboutme.html', '68%', '70%')">
                About Me
            </button>

            <button class="island island2" onclick="travelTo('favorites.html', '72%', '20%')">
                Hobbies
            </button>

            <button class="island island3" onclick="travelTo('projects.html', '18%', '20%')">
                Projects
            </button>

            <button class="island island4" onclick="travelTo('food.html', '53%', '45%')">
                Food
            </button>

            <button class="island island5" onclick="travelTo('myfuture.html', '23%', '72%')">
                Future
            </button>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>
</html>
