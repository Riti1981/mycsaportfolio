<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Welcome Aboard</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#87CEEB;

            min-height:100vh;

            font-family:Arial, sans-serif;

            display:flex;
            flex-direction:column;
        }

        /* NAVBAR */

        nav{
            width:100%;

            padding:25px;

            display:flex;

            justify-content:center;

            gap:50px;

            background:#1E3A5F;

            border-bottom:5px solid gold;

            box-shadow:0px 4px 10px rgba(0,0,0,0.3);
        }

        nav a{
            color:white;

            text-decoration:none;

            font-size:22px;

            font-weight:bold;

            transition:0.3s;
        }

        nav a:hover{
            color:gold;

            transform:scale(1.1);
        }

        /* HERO SECTION */

        .hero{
            flex:1;

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;

            text-align:center;

            padding:40px;
        }

        /* WELCOME IMAGE */

        .welcome-image{
            width:700px;

            max-width:90%;

            margin-bottom:50px;

            filter:drop-shadow(4px 4px 10px rgba(0,0,0,0.4));
        }

        /* CIRCLE IMAGES */

        .circle-container{
            display:flex;

            gap:40px;

            margin-bottom:60px;

            flex-wrap:wrap;

            justify-content:center;
        }

        .circle-container img{
            width:190px;

            height:190px;

            border-radius:50%;

            object-fit:cover;

            border:6px solid gold;

            box-shadow:0px 0px 20px rgba(0,0,0,0.4);

            transition:0.3s;
        }

        .circle-container img:hover{
            transform:scale(1.08);
        }

        /* SET SAIL BUTTON */

        .set-sail-btn{
            padding:20px 50px;

            font-size:30px;

            font-weight:bold;

            color:white;

            text-decoration:none;

            background:#1E3A5F;

            border:4px solid gold;

            border-radius:50px;

            transition:0.3s;

            box-shadow:0px 0px 15px rgba(0,0,0,0.4);
        }

        .set-sail-btn:hover{
            background:#29527A;

            transform:scale(1.08);
        }

    </style>

</head>

<body>

    <!-- NAVIGATION -->

    <nav>

        <a href="index.html">Home</a>

        <a href="aboutme.html">About Me</a>

        <a href="myfuture.html">Journey</a>

        <a href="projects.html">Projects</a>

        <a href="favorites.html">Favorites</a>

        <a href="food.html">Food</a>

    </nav>

    <!-- HERO SECTION -->

    <section class="hero">

        <!-- WELCOME ABOARD IMAGE -->

        <img src="images/Welcomeaboard.png" alt="Welcome Aboard"
        class="welcome-image">

        <!-- CIRCLE IMAGES -->

        <div class="circle-container">

            <img src="images/minisanji.jpg" alt="Sanji">

            <img src="images/miniluffy.jpg" alt="Luffy">

            <img src="images/minizoro.jpg" alt="Zoro">

        </div>

        <!-- BUTTON -->

        <a href="aboutme.html" class="set-sail-btn">

            ⚓ Set Sail

        </a>

    </section>

</body>

</html>
