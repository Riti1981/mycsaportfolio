<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <section id="ship-screen">

        <h2>Choose Your Ship</h2>

        <div class="ship-options">
            <img src="images/ship1.png" onclick="chooseShip('images/ship1.png', event)" alt="Ship 1">
            <img src="images/ship2.jpg" onclick="chooseShip('images/ship2.jpg', event)" alt="Ship 2">
        </div>

    </section>

    <section id="map-screen">

        <div class="map-container">

            <img src="images/map.jpg" class="map" alt="Grand Line Map">

            <img id="chosen-ship" class="ship" alt="Chosen Ship">

            <button class="island island1" onclick="travelTo('about')">
                About Me
            </button>

            <button class="island island2" onclick="travelTo('hobbies')">
                Hobbies
            </button>

            <button class="island island3" onclick="travelTo('projects')">
                Projects
            </button>

            <button class="island island4" onclick="travelTo('food')">
                Food
            </button>

            <button class="island island5" onclick="travelTo('future')">
                Future
            </button>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>
</html>
